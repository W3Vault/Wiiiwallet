name: Build Downloadable Wiiiwallet APK

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build arm64 debug APK
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout Wiiiwallet
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JavaScript dependencies
        id: npm-install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm install --include=dev --legacy-peer-deps 2>&1 | tee npm-install.log

      - name: Upload dependency installation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Wiiiwallet-npm-install-log
          path: npm-install.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after dependency installation failure
        if: steps.npm-install.outcome == 'failure'
        run: exit 1

      - name: Build Wiiiwallet arm64 debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug -PreactNativeArchitectures=arm64-v8a --no-daemon --stacktrace

      - name: Prepare downloadable filename
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Wiiiwallet-debug-arm64.apk

      - name: Upload Wiiiwallet APK
        uses: actions/upload-artifact@v4
        with:
          name: Wiiiwallet-debug-arm64-apk
          path: Wiiiwallet-debug-arm64.apk
          if-no-files-found: error
          retention-days: 7
