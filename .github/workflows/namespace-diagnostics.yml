name: Namespace diagnostics

on:
  pull_request:
    branches:
      - master

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Specify node version
        uses: actions/setup-node@v4
        with:
          node-version: 24.3.0
          cache: npm

      - name: Capture dependency installation
        run: |
          mkdir -p diagnostics
          npm install --legacy-peer-deps > diagnostics/install.txt 2>&1 || true

      - name: Capture TypeScript output
        run: ./node_modules/.bin/tsc --noEmit > diagnostics/typescript.txt 2>&1 || true

      - name: Capture ESLint output
        run: ./node_modules/.bin/eslint blue_modules/wiiicoin-namespace.ts screen/settings/NamespaceManager.tsx screen/settings/NamespaceDetails.tsx navigation/index.tsx navigation/DetailViewStackParamList.ts screen/settings/SettingsTools.tsx loc/wiiicoinNamespace.ts tests/unit/wiiicoin-namespace.test.ts > diagnostics/eslint.txt 2>&1 || true

      - name: Capture namespace unit output
        run: ./node_modules/.bin/jest tests/unit/wiiicoin-namespace.test.ts --runInBand > diagnostics/unit.txt 2>&1 || true

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: namespace-diagnostics
          path: diagnostics
          if-no-files-found: error
