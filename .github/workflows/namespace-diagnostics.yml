name: Namespace diagnostics

on:
  pull_request:
    branches:
      - master

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Specify node version
        uses: actions/setup-node@v4
        with:
          node-version: 24.3.0
          cache: npm

      - name: Capture dependency installation
        run: |
          mkdir -p diagnostics
          npm install --legacy-peer-deps > diagnostics/install.txt 2>&1 || true

      - name: Capture complete lint output
        run: npm run lint > diagnostics/lint.txt 2>&1 || true

      - name: Capture complete unit output
        run: npm run unit > diagnostics/unit.txt 2>&1 || true

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: namespace-diagnostics
          path: diagnostics
          if-no-files-found: error
