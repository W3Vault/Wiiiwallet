name: Apply namespace final sequence fix

on:
  push:
    branches:
      - agent/fix-namespace-final-sequence

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-namespace-final-sequence
          fetch-depth: 0

      - name: Apply source correction
        run: node scripts/apply-namespace-final-sequence-fix.mjs

      - name: Remove temporary patch automation
        run: |
          rm scripts/apply-namespace-final-sequence-fix.mjs
          rm .github/workflows/apply-namespace-final-sequence-fix.yml

      - name: Commit corrected source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix namespace transaction final sequence"
          git push origin HEAD:agent/fix-namespace-final-sequence
