name: Remove namespace unused import

on:
  push:
    branches:
      - agent/fix-namespace-final-sequence

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-namespace-final-sequence
          fetch-depth: 0

      - name: Remove unused import
        run: node scripts/remove-namespace-unused-import.mjs

      - name: Remove temporary cleanup automation
        run: |
          rm scripts/remove-namespace-unused-import.mjs
          rm .github/workflows/remove-namespace-unused-import.yml

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove unused namespace RBF import"
          git push origin HEAD:agent/fix-namespace-final-sequence
