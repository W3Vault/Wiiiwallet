name: Apply live Wiiicoin namespace derivation fix

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/fix-live-namespace-derivation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-live-namespace-derivation
          fetch-depth: 0

      - name: Apply live-chain namespace derivation
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              if old not in text:
                  raise SystemExit(f'Missing {label}')
              return text.replace(old, new, 1)

          namespace_path = Path('blue_modules/wiiicoin-namespace.ts')
          text = namespace_path.read_text()
          text = replace_once(
              text,
              "export const WIII_NAMESPACE_SEQUENCE = 0xffffffff;\nexport const WIII_NAMESPACE_TRANSFER_KEY_PREFIX = '__WALLET_TRANSFER__';",
              "export const WIII_NAMESPACE_SEQUENCE = 0xffffffff;\n"
              "// Wiiicoin mainnet launched after the 2020 NSFIX deployment window had expired.\n"
              "// The live mempool therefore uses the pre-NSFIX namespace hash: HASH160(input txid),\n"
              "// without appending the input output index.\n"
              "export const WIII_NAMESPACE_INCLUDE_VOUT = false;\n"
              "export const WIII_NAMESPACE_TRANSFER_KEY_PREFIX = '__WALLET_TRANSFER__';",
              'namespace constants anchor',
          )
          text = replace_once(
              text,
              "  const source = Buffer.concat([Buffer.from(txid, 'hex').reverse(), Buffer.from(String(vout), 'utf8')]);\n"
              "  const namespaceHash = bitcoin.crypto.hash160(source);",
              "  const txSource = Buffer.from(txid, 'hex').reverse();\n"
              "  const source = WIII_NAMESPACE_INCLUDE_VOUT ? Buffer.concat([txSource, Buffer.from(String(vout), 'utf8')]) : txSource;\n"
              "  const namespaceHash = bitcoin.crypto.hash160(source);",
              'namespace derivation anchor',
          )
          namespace_path.write_text(text)

          test_path = Path('tests/unit/wiiicoin-namespace.test.ts')
          test = test_path.read_text()
          test = replace_once(
              test,
              "  WIII_NAMESPACE_FEE_RATE,\n  WIII_NAMESPACE_SEQUENCE,",
              "  WIII_NAMESPACE_FEE_RATE,\n  WIII_NAMESPACE_INCLUDE_VOUT,\n  WIII_NAMESPACE_SEQUENCE,",
              'namespace test import anchor',
          )
          test = replace_once(
              test,
              "const NAMESPACE_ID = 'NaCaQWV7fnZDRFKVBhkhUvysEG1UKJvd1P';\n"
              "const NAMESPACE_PAYLOAD = '359cb5d1022c53411522ebe7f5b179772d0f1f54fd';",
              "const NAMESPACE_ID = 'NQTgCkBifLVXpFhtc4LVYr2aL1Pc3rymF2';\n"
              "const NAMESPACE_PAYLOAD = '3531dfa323f306ee13ba63fa2ab7c51a94160dabf5';\n"
              "const DEVICE_SOURCE_TXID = '5bf7201e9d2ca75dee17c38688a9183bf6016cb364b2ee655747f8391bcdc842';\n"
              "const DEVICE_NAMESPACE_ID = 'NTEf4Zbft422WDxDMtNyM7PQypemYtB5Ra';\n"
              "const DEVICE_NAMESPACE_PAYLOAD = '355051a7934af8ef07459f61a8af5baac641465b45';",
              'namespace expected values',
          )
          test = replace_once(
              test,
              "  it('derives the legacy-compatible namespace identifier from the first input', () => {\n"
              "    expect(deriveNamespaceId(SOURCE_TXID, 0)).toBe(NAMESPACE_ID);\n"
              "    expect(uint8ArrayToHex(namespaceToPayload(NAMESPACE_ID))).toBe(NAMESPACE_PAYLOAD);\n"
              "    expect(payloadToNamespace(namespaceToPayload(NAMESPACE_ID))).toBe(NAMESPACE_ID);\n"
              "  });",
              "  it('uses the live pre-NSFIX namespace derivation without the output index', () => {\n"
              "    expect(WIII_NAMESPACE_INCLUDE_VOUT).toBe(false);\n"
              "    expect(deriveNamespaceId(SOURCE_TXID, 0)).toBe(NAMESPACE_ID);\n"
              "    expect(deriveNamespaceId(SOURCE_TXID, 1)).toBe(NAMESPACE_ID);\n"
              "    expect(uint8ArrayToHex(namespaceToPayload(NAMESPACE_ID))).toBe(NAMESPACE_PAYLOAD);\n"
              "    expect(payloadToNamespace(namespaceToPayload(NAMESPACE_ID))).toBe(NAMESPACE_ID);\n"
              "  });\n\n"
              "  it('matches the live device funding input rejected by the NSFIX-era payload', () => {\n"
              "    expect(deriveNamespaceId(DEVICE_SOURCE_TXID, 0)).toBe(DEVICE_NAMESPACE_ID);\n"
              "    expect(uint8ArrayToHex(namespaceToPayload(DEVICE_NAMESPACE_ID))).toBe(DEVICE_NAMESPACE_PAYLOAD);\n"
              "  });",
              'namespace derivation regression test',
          )
          test_path.write_text(test)

          audit_path = Path('scripts/audit-wiiiwallet-consolidation.mjs')
          audit = audit_path.read_text()
          anchor = "requireText(namespacePath, 'export const WIII_NAMESPACE_SEQUENCE = 0xffffffff;', 'namespace final input sequence');\n"
          audit = replace_once(
              audit,
              anchor,
              anchor
              + "requireText(namespacePath, 'export const WIII_NAMESPACE_INCLUDE_VOUT = false;', 'live pre-NSFIX namespace derivation');\n"
              + "requireText(namespacePath, 'WIII_NAMESPACE_INCLUDE_VOUT ? Buffer.concat', 'conditional namespace output-index hashing');\n"
              + "forbidText(namespacePath, \"const source = Buffer.concat([Buffer.from(txid, 'hex').reverse(), Buffer.from(String(vout), 'utf8')]);\", 'always-on NSFIX namespace derivation');\n",
              'namespace audit anchor',
          )
          file_anchor = "requireFile('tests/unit/wiiicoin-namespace-fee.test.ts');\n"
          audit = replace_once(
              audit,
              file_anchor,
              file_anchor
              + "requireFile('docs/WIIICOIN_NAMESPACE_DERIVATION.md');\n"
              + "requireText('docs/WIIICOIN_NAMESPACE_DERIVATION.md', 'DEPLOYMENT_NSFIX', 'namespace deployment explanation');\n"
              + "requireText('tests/unit/wiiicoin-namespace.test.ts', 'NTEf4Zbft422WDxDMtNyM7PQypemYtB5Ra', 'live rejected-input namespace regression');\n",
              'namespace documentation audit anchor',
          )
          audit_path.write_text(audit)

          Path('docs/WIIICOIN_NAMESPACE_DERIVATION.md').write_text(
              "# Wiiicoin namespace derivation\n\n"
              "Wiiicoin Core derives a namespace identifier from the first funding input. The hash format depends on the `DEPLOYMENT_NSFIX` version-bits state.\n\n"
              "Mainnet was created in September 2025, while the configured `DEPLOYMENT_NSFIX` signalling window ran from 15 July 2020 to 30 August 2020. The deployment therefore did not activate on the live chain. Its mempool uses the pre-NSFIX rule:\n\n"
              "```text\nnamespace payload = 0x35 || HASH160(reverse(input_0_txid))\n```\n\n"
              "The output index must not be appended. Appending the ASCII output index creates a different payload and `CWiiiMemPool::validateNamespace` rejects the transaction without a detailed validation-state message, which ElectrumX surfaces as `the transaction was rejected by network rules`.\n\n"
              "For the device funding input `5bf7201e9d2ca75dee17c38688a9183bf6016cb364b2ee655747f8391bcdc842:0`, the live payload is:\n\n"
              "```text\n355051a7934af8ef07459f61a8af5baac641465b45\n```\n\n"
              "Its Base58Check namespace ID is `NTEf4Zbft422WDxDMtNyM7PQypemYtB5Ra`.\n"
          )
          PY

      - name: Remove temporary files
        run: |
          git rm .github/workflows/apply-live-namespace-derivation-fix.yml
          git rm docs/.live-namespace-derivation-trigger

      - name: Commit correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix namespace derivation for live Wiiicoin mainnet"
          git push origin HEAD:agent/fix-live-namespace-derivation
