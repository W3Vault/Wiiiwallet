name: Temporary live namespace check

on:
  push:
    branches:
      - agent/copy-namespace-id
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  verify-live-namespace:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Query live namespace through ElectrumX
        run: python3 .github/scripts/tmp-live-namespace-check.py
