name: One-time uppercase terminology replacement

on:
  push:
    branches:
      - agent/rename-keva-to-wiii

permissions:
  contents: write

jobs:
  replace-uppercase-term:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace exact uppercase term in tracked UTF-8 files
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import subprocess

          workflow = Path('.github/workflows/case-sensitive-uppercase-renames.yml')
          old = ''.join(chr(value) for value in (75, 69, 86, 65))
          new = 'WIII'

          tracked = subprocess.check_output(['git', 'ls-files', '-z']).decode('utf-8').split('\0')
          changed_files = []
          total_replacements = 0

          for name in tracked:
              if not name:
                  continue
              path = Path(name)
              if path == workflow or not path.is_file():
                  continue
              data = path.read_bytes()
              try:
                  text = data.decode('utf-8')
              except UnicodeDecodeError:
                  continue

              count = text.count(old)
              if not count:
                  continue

              path.write_text(text.replace(old, new), encoding='utf-8', newline='')
              changed_files.append(name)
              total_replacements += count

          print(f'Changed {len(changed_files)} files with {total_replacements} exact uppercase replacements')
          for name in changed_files:
              print(name)

          if total_replacements == 0:
              raise SystemExit('No exact uppercase matches were found')
          PY

      - name: Remove one-time workflow and commit replacements
        shell: bash
        run: |
          rm .github/workflows/case-sensitive-uppercase-renames.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace uppercase namespace terminology with WIII"
          git push origin "HEAD:${GITHUB_REF_NAME}"
