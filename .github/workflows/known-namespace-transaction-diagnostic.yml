name: Known live Wiiicoin namespace transaction diagnostic

on:
  pull_request:
    branches:
      - master

jobs:
  diagnose:
    if: github.head_ref == 'agent/live-electrum-protocol-diagnostic'
    runs-on: ubuntu-latest
    steps:
      - name: Retrieve known namespace history and raw transactions
        shell: bash
        run: |
          set +e
          python3 - <<'PY' > known-namespace-diagnostic.txt 2>&1
          import hashlib
          import json
          import socket
          import ssl
          import traceback
          import urllib.request

          namespace_id = 'NRrdrcoosujNi9FU1jznezpKcbySGkb2Y3'
          api_url = 'https://www.wiiicoin.io/api/wg?n=NRrdrcoosujNi9FU1jznezpKcbySGkb2Y3&k=oil1-received.json'
          alphabet = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz'

          def b58decode_check(value):
              number = 0
              for char in value:
                  number = number * 58 + alphabet.index(char)
              raw = number.to_bytes((number.bit_length() + 7) // 8, 'big') if number else b''
              raw = b'\x00' * (len(value) - len(value.lstrip('1'))) + raw
              payload, checksum = raw[:-4], raw[-4:]
              expected = hashlib.sha256(hashlib.sha256(payload).digest()).digest()[:4]
              if checksum != expected:
                  raise ValueError('bad Base58Check checksum')
              return payload

          def push_data(data):
              size = len(data)
              if size < 0x4c:
                  return bytes([size]) + data
              if size <= 0xff:
                  return b'\x4c' + bytes([size]) + data
              raise ValueError('diagnostic data too large')

          try:
              payload = b58decode_check(namespace_id)
              root_key = payload + b'\x01_WIII_NS_'
              synthetic_script = b'\xd1' + push_data(root_key) + b'\x00\x6d\x75\x6a'
              script_hash = hashlib.sha256(synthetic_script).digest()[::-1].hex()

              print('namespace_id:', namespace_id)
              print('decoded_payload:', payload.hex())
              print('namespace_prefix_decimal:', payload[0])
              print('root_key:', root_key.hex())
              print('synthetic_script:', synthetic_script.hex())
              print('scripthash:', script_hash)

              try:
                  request = urllib.request.Request(api_url, headers={'User-Agent': 'Wiiiwallet namespace diagnostic'})
                  with urllib.request.urlopen(request, timeout=30) as response:
                      print('api_status:', response.status)
                      print('api_body:', response.read().decode(errors='replace'))
              except Exception as error:
                  print('api_error:', repr(error))

              host = 'etx1.wiiicoin.io'
              port = 50002
              context = ssl.create_default_context()
              request_counter = [1]
              receive_buffer = bytearray()

              with socket.create_connection((host, port), timeout=30) as sock:
                  with context.wrap_socket(sock, server_hostname=host) as stream:
                      def rpc(method, params):
                          request_id = request_counter[0]
                          request_counter[0] += 1
                          stream.sendall((json.dumps({
                              'jsonrpc': '2.0',
                              'id': request_id,
                              'method': method,
                              'params': params,
                          }) + '\n').encode())
                          while True:
                              newline = receive_buffer.find(b'\n')
                              if newline >= 0:
                                  line = bytes(receive_buffer[:newline])
                                  del receive_buffer[:newline + 1]
                                  response = json.loads(line)
                                  if response.get('id') != request_id:
                                      print('unexpected_response:', json.dumps(response, sort_keys=True))
                                      continue
                                  if response.get('error'):
                                      raise RuntimeError(response['error'])
                                  return response.get('result')
                              chunk = stream.recv(1_000_000)
                              if not chunk:
                                  raise ConnectionError('ElectrumX closed connection')
                              receive_buffer.extend(chunk)

                      print('server_version:', json.dumps(rpc('server.version', ['Wiiiwallet known namespace diagnostic', ['1.4', '1.7']]), sort_keys=True))
                      history = rpc('blockchain.scripthash.get_history', [script_hash])
                      print('history:', json.dumps(history, sort_keys=True))
                      txids = [item['tx_hash'] for item in history]
                      if txids:
                          try:
                              infos = rpc('blockchain.wiii.get_transactions_info', [txids, True])
                              print('transaction_infos:', json.dumps(infos, sort_keys=True))
                          except Exception as error:
                              print('transaction_info_error:', repr(error))
                      for index, item in enumerate(history):
                          try:
                              raw = rpc('blockchain.transaction.get', [item['tx_hash'], False])
                              print(f'raw_transaction_{index}_height_{item["height"]}:', raw)
                          except Exception as error:
                              print(f'raw_transaction_{index}_error:', repr(error))
          except Exception:
              traceback.print_exc()
          PY
          cat known-namespace-diagnostic.txt
          true

      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: known-live-namespace-transaction-diagnostic
          path: known-namespace-diagnostic.txt
          if-no-files-found: error
          retention-days: 2
