name: Wiiicoin build and live smoke test

on:
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      run_live_transaction:
        description: 'Run the funded ElectrumX round-trip transaction'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-and-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      # Pull-request builds perform public ElectrumX checks without spending funds.
      # The funded transaction runs only when explicitly enabled on workflow_dispatch.
      WIIICOIN_TEST_WIF: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_transaction && secrets.WIIICOIN_TEST_WIF || '' }}
      WIIICOIN_TEST_AMOUNT_BASE_UNITS: ${{ vars.WIIICOIN_TEST_AMOUNT_BASE_UNITS || '1000000' }}
      WIIICOIN_TEST_FEE_BASE_UNITS: ${{ vars.WIIICOIN_TEST_FEE_BASE_UNITS || '100000' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.3.0'
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install JavaScript dependencies without Git prepare scripts
        id: npm-install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm ci --legacy-peer-deps --ignore-scripts 2>&1 | tee npm-install.log

      - name: Upload npm diagnostics
        if: steps.npm-install.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: npm-install-diagnostics
          path: npm-install.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after npm failure
        if: steps.npm-install.outcome == 'failure'
        run: exit 1

      - name: Run Wiiiwallet post-install preparation
        run: |
          npm run releasenotes2json
          npm run branch2json
          npm run patches

      - name: Prepare standalone bundle dependencies
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const capturePackagePath = 'node_modules/react-native-capture-protection/package.json';
          const capturePackage = JSON.parse(fs.readFileSync(capturePackagePath, 'utf8'));
          capturePackage.main = './src/index.ts';
          capturePackage.module = './src/index.ts';
          capturePackage.types = './src/index.ts';
          capturePackage['react-native'] = './src/index.ts';
          capturePackage.exports = capturePackage.exports || {};
          capturePackage.exports['.'] = {
            'react-native': './src/index.ts',
            module: './src/index.ts',
            'module-sync': './src/index.ts',
            default: './src/index.ts',
          };
          fs.writeFileSync(capturePackagePath, `${JSON.stringify(capturePackage, null, 2)}\n`);
          NODE
          test -f node_modules/react-native-capture-protection/src/index.ts

      - name: Verify Wiiicoin branding and configuration
        shell: bash
        run: |
          set -euo pipefail
          grep -F '<string name="app_name">Wiiicoin</string>' android/app/src/main/res/values/strings.xml
          grep -F 'android:icon="@drawable/wiiicoin_logo"' android/app/src/main/AndroidManifest.xml
          grep -F "name: 'Wiiicoin Explorer', url: 'https://wiiicoin.io'" models/blockExplorer.ts
          grep -F "loc.units.BTC = 'WIII'" index.js
          grep -F 'fastestFee: 100' models/networkTransactionFees.ts
          grep -F 'mediumFee: 10' models/networkTransactionFees.ts
          grep -F 'slowFee: 1' models/networkTransactionFees.ts
          test -f android/app/src/main/res/drawable/wiiicoin_logo.xml

      - name: Verify wiiicoin.io valuation source
        id: wiiicoin-price
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node --input-type=module <<'NODE' 2>&1 | tee wiiicoin-price-test.log
          import fs from 'node:fs';

          const url = 'https://wiiicoin.io/ext/getsummary';
          let lastError;

          for (let attempt = 1; attempt <= 3; attempt++) {
            try {
              const response = await fetch(url, {
                headers: {
                  Accept: 'application/json',
                  'User-Agent': 'Wiiicoin-Android-Build/1.0',
                },
              });
              if (!response.ok) throw new Error(`HTTP ${response.status}`);

              const summary = await response.json();
              const lastUSDPrice = Number(summary.lastUSDPrice);
              const lastPrice = Number(summary.lastPrice);
              const hasUsdPrice = Number.isFinite(lastUSDPrice) && lastUSDPrice > 0;
              const hasPairPrice = Number.isFinite(lastPrice) && lastPrice > 0;
              if (!hasUsdPrice && !hasPairPrice) {
                throw new Error(`No positive WIII valuation returned: ${JSON.stringify(summary)}`);
              }

              const result = {
                generatedAt: new Date().toISOString(),
                url,
                lastUSDPrice: summary.lastUSDPrice,
                lastPrice: summary.lastPrice,
                source: 'wiiicoin.io',
              };
              fs.writeFileSync('wiiicoin-price-result.json', `${JSON.stringify(result, null, 2)}\n`);
              console.log(JSON.stringify(result, null, 2));
              process.exit(0);
            } catch (error) {
              lastError = error;
              console.error(`Valuation check attempt ${attempt} failed:`, error.message);
              if (attempt < 3) await new Promise(resolve => setTimeout(resolve, 2000));
            }
          }

          throw lastError;
          NODE

      - name: Upload valuation diagnostics
        if: steps.wiiicoin-price.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: wiiicoin-price-diagnostics
          path: wiiicoin-price-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Upload valuation result
        if: steps.wiiicoin-price.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: wiiicoin-price-result
          path: wiiicoin-price-result.json
          if-no-files-found: error
          retention-days: 7

      - name: Stop after valuation failure
        if: steps.wiiicoin-price.outcome == 'failure'
        run: exit 1

      - name: Test Wiiicoin BIP49 wallet and transaction signing
        id: wiiicoin-unit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail

          camera_dir='node_modules/react-native-camera-kit-no-google'
          camera_package="$camera_dir/package.json"
          camera_backup="$camera_dir/package.json.wiiicoin-test-backup"
          camera_entry="$camera_dir/wiiicoin-jest-entry.js"

          cp "$camera_package" "$camera_backup"
          restore_camera_package() {
            cp "$camera_backup" "$camera_package"
            rm -f "$camera_backup" "$camera_entry"
          }
          trap restore_camera_package EXIT

          node <<'NODE'
          const fs = require('fs');
          const packagePath = 'node_modules/react-native-camera-kit-no-google/package.json';
          const entryPath = 'node_modules/react-native-camera-kit-no-google/wiiicoin-jest-entry.js';
          const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          pkg.main = './wiiicoin-jest-entry.js';
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);
          fs.writeFileSync(entryPath, 'module.exports = {};\n');
          NODE

          npx jest tests/unit/wiiicoin-network.test.ts \
            --runInBand \
            --no-cache 2>&1 | tee wiiicoin-unit-test.log

      - name: Upload Wiiicoin unit-test diagnostics
        if: steps.wiiicoin-unit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: wiiicoin-unit-test-diagnostics
          path: wiiicoin-unit-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after Wiiicoin unit-test failure
        if: steps.wiiicoin-unit.outcome == 'failure'
        run: exit 1

      - name: Generate wallet and test ElectrumX
        id: live-test
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/wiiicoin-live-smoke.mjs 2>&1 | tee wiiicoin-live-test.log

      - name: Upload live-test diagnostics
        if: steps.live-test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: wiiicoin-live-test-diagnostics
          path: wiiicoin-live-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Upload smoke-test result
        if: always() && steps.live-test.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: wiiicoin-smoke-result
          path: wiiicoin-smoke-result.json
          if-no-files-found: warn
          retention-days: 7

      - name: Stop after live-test failure
        if: steps.live-test.outcome == 'failure'
        run: exit 1

      - name: Build Android arm64 standalone APK
        id: android-build
        continue-on-error: true
        working-directory: android
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew assembleStandalone \
            -PreactNativeArchitectures=arm64-v8a \
            --build-cache \
            --parallel \
            --no-daemon \
            --stacktrace 2>&1 | tee ../android-build.log

      - name: Upload Android build diagnostics
        if: steps.android-build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: android-build-diagnostics
          path: android-build.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after Android build failure
        if: steps.android-build.outcome == 'failure'
        run: exit 1

      - name: Upload Android standalone APK
        if: steps.android-build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: Wiiicoin-android-arm64-standalone
          path: android/app/build/outputs/apk/standalone/app-standalone.apk
          if-no-files-found: error
          retention-days: 7
