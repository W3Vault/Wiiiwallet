name: Wiiiwallet standalone Android build

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-standalone-apk:
    runs-on: ubuntu-24.04
    timeout-minutes: 75

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.3.0'
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android NDK
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;27.0.12077973"
          test -d "$ANDROID_SDK_ROOT/ndk/27.0.12077973"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install JavaScript dependencies
        id: npm-install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm ci --legacy-peer-deps --ignore-scripts 2>&1 | tee npm-install.log

      - name: Upload npm diagnostics
        if: steps.npm-install.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: npm-install-diagnostics
          path: npm-install.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after npm failure
        if: steps.npm-install.outcome == 'failure'
        run: exit 1

      - name: Run Wiiiwallet post-install preparation
        run: |
          npm run releasenotes2json
          npm run branch2json
          npm run patches

      - name: Apply final Wiiicoin UI fixes
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');

          const replaceOnce = (file, before, after) => {
            const source = fs.readFileSync(file, 'utf8');
            if (!source.includes(before)) {
              throw new Error(`Expected source fragment not found in ${file}: ${before.slice(0, 120)}`);
            }
            fs.writeFileSync(file, source.replace(before, after));
          };

          // Preserve the upstream internal unit identifier so saved wallets and
          // formatBalance continue to resolve correctly. User-facing localisation
          // still rewrites the BTC label to WIII in index.js.
          replaceOnce("models/bitcoinUnits.ts", "  BTC: 'WIII',", "  BTC: 'BTC',");

          // Replace the Bitcoin watermark on standard on-chain wallet cards with
          // the supplied Wiiicoin vector component.
          replaceOnce(
            'components/WalletsCarousel.tsx',
            "import { BlueSpacing10 } from './BlueSpacing';",
            "import { BlueSpacing10 } from './BlueSpacing';\nimport WiiicoinLogo from './WiiicoinLogo';",
          );
          replaceOnce(
            'components/WalletsCarousel.tsx',
            "      default:\n        image = direction === 'rtl' ? require('../img/btc-shape-rtl.png') : require('../img/btc-shape.png');",
            "      default:\n        image = undefined;",
          );
          replaceOnce(
            'components/WalletsCarousel.tsx',
            "              <ImageBackground source={image} style={[iStyles.image, isCompact && iStyles.imageCompact]} />",
            `              {image ? (\n                <ImageBackground source={image} style={[iStyles.image, isCompact && iStyles.imageCompact]} />\n              ) : (\n                <WiiicoinLogo\n                  width={isCompact ? 78 : 99}\n                  height={isCompact ? 74 : 94}\n                  style={[iStyles.image, isCompact && iStyles.imageCompact]}\n                  opacity={0.28}\n                />\n              )}`,
          );

          // Replace the inherited BlueWallet startup artwork with a Wiiicoin logo
          // that rotates while wallet storage is opening/decrypting.
          replaceOnce('screen/UnlockWith.tsx', '  Image,\n', '');
          replaceOnce(
            'screen/UnlockWith.tsx',
            "import { PasswordInput, PasswordInputHandle } from '../components/PasswordInput';",
            "import { PasswordInput, PasswordInputHandle } from '../components/PasswordInput';\nimport WiiicoinLogo from '../components/WiiicoinLogo';",
          );
          replaceOnce(
            'screen/UnlockWith.tsx',
            '  const keyboardOffset = useRef(new Animated.Value(0)).current;',
            '  const keyboardOffset = useRef(new Animated.Value(0)).current;\n  const logoRotation = useRef(new Animated.Value(0)).current;',
          );
          replaceOnce(
            'screen/UnlockWith.tsx',
            `  useEffect(() => {\n    setWalletsInitialized(false);\n  }, [setWalletsInitialized]);`,
            `  useEffect(() => {\n    setWalletsInitialized(false);\n  }, [setWalletsInitialized]);\n\n  useEffect(() => {\n    if (!state.isAuthenticating) {\n      logoRotation.stopAnimation();\n      logoRotation.setValue(0);\n      return;\n    }\n\n    logoRotation.setValue(0);\n    const animation = Animated.loop(\n      Animated.timing(logoRotation, {\n        toValue: 1,\n        duration: 1200,\n        easing: Easing.linear,\n        useNativeDriver: true,\n      }),\n    );\n    animation.start();\n    return () => animation.stop();\n  }, [state.isAuthenticating, logoRotation]);`,
          );
          replaceOnce(
            'screen/UnlockWith.tsx',
            `              <Image source={require('../img/icon.png')} style={styles.logoImage} resizeMode="contain" />`,
            `              <Animated.View\n                style={[\n                  styles.logoImage,\n                  {\n                    transform: [\n                      {\n                        rotate: logoRotation.interpolate({\n                          inputRange: [0, 1],\n                          outputRange: ['0deg', '360deg'],\n                        }),\n                      },\n                    ],\n                  },\n                ]}\n              >\n                <WiiicoinLogo width={100} height={75} />\n              </Animated.View>`,
          );
          NODE

      - name: Prepare standalone bundle dependencies
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const packagePath = 'node_modules/react-native-capture-protection/package.json';
          const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          pkg.main = './src/index.ts';
          pkg.module = './src/index.ts';
          pkg.types = './src/index.ts';
          pkg['react-native'] = './src/index.ts';
          pkg.exports = pkg.exports || {};
          pkg.exports['.'] = {
            'react-native': './src/index.ts',
            module: './src/index.ts',
            'module-sync': './src/index.ts',
            default: './src/index.ts',
          };
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
          test -f node_modules/react-native-capture-protection/src/index.ts

      - name: Verify Wiiiwallet configuration
        shell: bash
        run: |
          set -euo pipefail
          grep -F '<string name="app_name">Wiiiwallet</string>' android/app/src/main/res/values/strings.xml
          grep -F 'android:icon="@drawable/wiiicoin_app_icon"' android/app/src/main/AndroidManifest.xml
          grep -F 'android:roundIcon="@drawable/wiiicoin_app_icon"' android/app/src/main/AndroidManifest.xml
          grep -F "BTC: 'BTC'" models/bitcoinUnits.ts
          grep -F "import WiiicoinLogo from './WiiicoinLogo';" components/WalletsCarousel.tsx
          grep -F 'image = undefined;' components/WalletsCarousel.tsx
          grep -F "import WiiicoinLogo from '../components/WiiicoinLogo';" screen/UnlockWith.tsx
          grep -F 'const animation = Animated.loop(' screen/UnlockWith.tsx
          grep -F 'android:windowBackground">@drawable/wiiiwallet_splash' android/app/src/main/res/values/styles.xml
          grep -F 'android:windowSplashScreenAnimatedIcon">@drawable/wiiicoin_logo' android/app/src/main/res/values-v31/styles.xml
          grep -F "host: 'etx1.wiiicoin.io'" blue_modules/wiiicoin-network.ts
          grep -F 'ssl: 50002' blue_modules/wiiicoin-network.ts
          grep -F 'standalone {' android/app/build.gradle
          grep -F 'debuggable false' android/app/build.gradle
          test -f components/WiiicoinLogo.tsx
          test -f android/app/src/main/res/drawable/wiiicoin_logo.xml
          test -f android/app/src/main/res/drawable/wiiicoin_app_icon.xml
          test -f android/app/src/main/res/drawable/wiiiwallet_splash.xml

      - name: Test Wiiicoin wallet configuration
        id: wiiicoin-unit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          camera_dir='node_modules/react-native-camera-kit-no-google'
          camera_package="$camera_dir/package.json"
          camera_backup="$camera_dir/package.json.wiiicoin-test-backup"
          camera_entry="$camera_dir/wiiicoin-jest-entry.js"

          cp "$camera_package" "$camera_backup"
          restore_camera_package() {
            cp "$camera_backup" "$camera_package"
            rm -f "$camera_backup" "$camera_entry"
          }
          trap restore_camera_package EXIT

          node <<'NODE'
          const fs = require('fs');
          const packagePath = 'node_modules/react-native-camera-kit-no-google/package.json';
          const entryPath = 'node_modules/react-native-camera-kit-no-google/wiiicoin-jest-entry.js';
          const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          pkg.main = './wiiicoin-jest-entry.js';
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);
          fs.writeFileSync(entryPath, 'module.exports = {};\n');
          NODE

          npx jest tests/unit/wiiicoin-network.test.ts \
            --runInBand \
            --no-cache 2>&1 | tee wiiicoin-unit-test.log

      - name: Upload unit-test diagnostics
        if: steps.wiiicoin-unit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: wiiicoin-unit-test-diagnostics
          path: wiiicoin-unit-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after unit-test failure
        if: steps.wiiicoin-unit.outcome == 'failure'
        run: exit 1

      - name: Build Android arm64 standalone APK
        id: android-build
        continue-on-error: true
        working-directory: android
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew assembleStandalone \
            -PreactNativeArchitectures=arm64-v8a \
            --build-cache \
            --parallel \
            --no-daemon \
            --stacktrace 2>&1 | tee ../android-build.log

      - name: Upload Android build diagnostics
        if: steps.android-build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: android-build-diagnostics
          path: android-build.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after Android build failure
        if: steps.android-build.outcome == 'failure'
        run: exit 1

      - name: Prepare downloadable APK
        run: cp android/app/build/outputs/apk/standalone/app-standalone.apk Wiiiwallet-android-arm64-standalone.apk

      - name: Upload Wiiiwallet standalone APK
        uses: actions/upload-artifact@v4
        with:
          name: Wiiiwallet-android-arm64-standalone
          path: Wiiiwallet-android-arm64-standalone.apk
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Check default ElectrumX SSL endpoint
        continue-on-error: true
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import tls from 'node:tls';
          const host = 'etx1.wiiicoin.io';
          const port = 50002;
          await new Promise((resolve, reject) => {
            const socket = tls.connect(
              {
                host,
                port,
                servername: host,
                rejectUnauthorized: true,
              },
              () => {
                if (!socket.authorized) {
                  reject(socket.authorizationError ?? new Error('TLS certificate was not authorized'));
                  return;
                }
                socket.end();
                resolve();
              },
            );
            socket.setTimeout(10000, () => socket.destroy(new Error('TLS connection timeout')));
            socket.on('error', reject);
          });
          console.log(`Connected securely to ${host}:${port}`);
          NODE
