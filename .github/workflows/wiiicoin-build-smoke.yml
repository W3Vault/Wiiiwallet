name: Wiiicoin build and live smoke test

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      WIIICOIN_TEST_WIF: ${{ secrets.WIIICOIN_TEST_WIF }}
      WIIICOIN_TEST_AMOUNT_BASE_UNITS: ${{ vars.WIIICOIN_TEST_AMOUNT_BASE_UNITS || '1000000' }}
      WIIICOIN_TEST_FEE_BASE_UNITS: ${{ vars.WIIICOIN_TEST_FEE_BASE_UNITS || '100000' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.3.0'
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install JavaScript dependencies without Git prepare scripts
        id: npm-install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm ci --legacy-peer-deps --ignore-scripts 2>&1 | tee npm-install.log

      - name: Upload npm diagnostics
        if: steps.npm-install.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: npm-install-diagnostics
          path: npm-install.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after npm failure
        if: steps.npm-install.outcome == 'failure'
        run: exit 1

      - name: Run Wiiiwallet post-install preparation
        run: |
          npm run releasenotes2json
          npm run branch2json
          npm run patches

      - name: Run Wiiicoin network unit tests
        id: unit-test
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npx jest tests/unit/wiiicoin-network.test.ts --runInBand --forceExit 2>&1 | tee wiiicoin-unit-test.log

      - name: Upload unit-test diagnostics
        if: steps.unit-test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: wiiicoin-unit-test-diagnostics
          path: wiiicoin-unit-test.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after unit-test failure
        if: steps.unit-test.outcome == 'failure'
        run: exit 1

      - name: Generate wallet and test ElectrumX
        run: npx jest tests/integration/wiiicoin-live-smoke.test.ts --runInBand --forceExit

      - name: Build Android debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload smoke-test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wiiicoin-smoke-result
          path: wiiicoin-smoke-result.json
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Android APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Wiiiwallet-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
