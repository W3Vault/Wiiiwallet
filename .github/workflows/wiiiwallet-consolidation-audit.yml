name: Wiiiwallet Consolidation Audit

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify consolidated Wiiiwallet requirements
        run: node scripts/audit-wiiiwallet-consolidation.mjs
