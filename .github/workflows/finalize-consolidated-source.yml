name: Finalize consolidated Wiiiwallet source

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Clean consolidated source
        run: |
          node scripts/fix-consolidated-source.mjs
          rm scripts/fix-consolidated-source.mjs
          node scripts/audit-wiiiwallet-consolidation.mjs
          git diff --check

      - name: Commit source cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blue_modules/currency.ts package.json scripts/fix-consolidated-source.mjs
          git commit -m "Clean consolidated Wiiiwallet source"
          git push origin HEAD:${{ github.head_ref }}
