name: Build Wiiiwallet non-debug APK

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wiiiwallet-nondebug-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release-apk:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.3.0'
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;27.0.12077973"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install JavaScript dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Apply Wiiiwallet preparation
        run: |
          npm run releasenotes2json
          npm run branch2json
          npm run patches

      - name: Prepare React Native bundle dependency
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const packagePath = 'node_modules/react-native-capture-protection/package.json';
          const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          pkg.main = './src/index.ts';
          pkg.module = './src/index.ts';
          pkg.types = './src/index.ts';
          pkg['react-native'] = './src/index.ts';
          pkg.exports = pkg.exports || {};
          pkg.exports['.'] = {
            'react-native': './src/index.ts',
            module: './src/index.ts',
            'module-sync': './src/index.ts',
            default: './src/index.ts',
          };
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Generate dedicated beta release signing key
        shell: bash
        run: |
          keytool -genkeypair \
            -keystore "$GITHUB_WORKSPACE/android/app/wiiiwallet-beta-release.jks" \
            -storepass wiiiwallet-beta-release \
            -alias wiiiwallet-beta \
            -keypass wiiiwallet-beta-release \
            -keyalg RSA \
            -keysize 4096 \
            -validity 10000 \
            -dname "CN=Wiiiwallet Beta, OU=W3Vault, O=W3Vault, L=London, C=GB"

      - name: Configure release signing
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path('android/app/build.gradle')
          source = path.read_text()

          signing_block = '''
              signingConfigs {
                  wiiiwalletRelease {
                      storeFile file(System.getenv("WIII_RELEASE_STORE_FILE"))
                      storePassword System.getenv("WIII_RELEASE_STORE_PASSWORD")
                      keyAlias System.getenv("WIII_RELEASE_KEY_ALIAS")
                      keyPassword System.getenv("WIII_RELEASE_KEY_PASSWORD")
                  }
              }

          '''

          source, count = re.subn(r'(?m)^(\s*)buildTypes\s*\{', lambda m: signing_block + m.group(1) + 'buildTypes {', source, count=1)
          if count != 1:
              raise SystemExit('Unable to insert release signing configuration')

          source, count = re.subn(
              r'(?m)^(\s*)release\s*\{',
              lambda m: m.group(0) + '\n' + m.group(1) + '    signingConfig signingConfigs.wiiiwalletRelease\n' + m.group(1) + '    debuggable false',
              source,
              count=1,
          )
          if count != 1:
              raise SystemExit('Unable to configure release build type')

          path.write_text(source)
          print(path.read_text())
          PY

      - name: Build signed non-debug release APK
        working-directory: android
        env:
          WIII_RELEASE_STORE_FILE: ${{ github.workspace }}/android/app/wiiiwallet-beta-release.jks
          WIII_RELEASE_STORE_PASSWORD: wiiiwallet-beta-release
          WIII_RELEASE_KEY_ALIAS: wiiiwallet-beta
          WIII_RELEASE_KEY_PASSWORD: wiiiwallet-beta-release
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            --build-cache \
            --parallel \
            --no-daemon \
            --stacktrace

      - name: Verify release APK
        shell: bash
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          test -f "$APK"
          test -s "$APK"
          jarsigner -verify -strict -certs "$APK"
          mkdir -p release
          cp "$APK" release/Wiiiwallet-arm64-release.apk
          sha256sum release/Wiiiwallet-arm64-release.apk > release/SHA256SUMS.txt
          cat > release/BUILD-INFO.txt <<'TXT'
          Wiiiwallet non-debug Android beta

          Build type: release
          Debuggable: false
          Architecture: arm64-v8a
          Signing: dedicated Wiiiwallet beta release certificate
          Distribution: direct testing only; not Play Store production signing
          TXT

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: Wiiiwallet-arm64-release
          path: release
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
